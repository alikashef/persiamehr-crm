server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 50m;

    location = /crm {
        include snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:3001;
    }

    location ^~ /crm/ {
        include snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:3001;
    }

    location /crm-static/ {
        alias /srv/apps/persiamehr-crm/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /crm-media/ {
        alias /srv/apps/persiamehr-crm/backend/media/;
    }

    location /crm-api/ {
        include snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:8001/crm-api/;
    }

    location /crm-admin/ {
        include snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:8001/crm-admin/;
    }

    location /static/ {
        alias /srv/apps/persiamehr-main/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /srv/apps/persiamehr-main/backend/media/;
    }

    location /api/ {
        include snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location /admin/ {
        include snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:8000/admin/;
    }

    location / {
        include snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:3001;
    }
}
